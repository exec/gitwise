name: Deploy to Production

on:
  workflow_dispatch:
  push:
    branches: [prod]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to production server
        uses: appleboy/ssh-action@v1
        env:
          BRANCH: ${{ github.ref_name }}
        with:
          host: 165.227.126.169
          username: root
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          envs: BRANCH
          script: |
            set -e
            cd /opt/gitwise
            git fetch origin
            git checkout "origin/$BRANCH" -- .
            git reset HEAD .

            # Run any new migrations
            for f in migrations/*.sql; do
              docker compose -f docker-compose.prod.yml exec -T postgres psql -U gitwise -f /dev/stdin < "$f" 2>&1 || true
            done

            # Rebuild and restart app (preserves volumes)
            docker compose -f docker-compose.prod.yml up -d --build gitwise
            docker compose -f docker-compose.prod.yml restart caddy

            echo "Deploy complete"
