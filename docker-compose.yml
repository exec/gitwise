services:
  gitwise:
    build: .
    ports:
      - "3000:3000"
    environment:
      GITWISE_DB_HOST: postgres
      GITWISE_DB_PORT: 5432
      GITWISE_DB_USER: gitwise
      GITWISE_DB_PASSWORD: gitwise
      GITWISE_DB_NAME: gitwise
      GITWISE_REDIS_HOST: redis
      GITWISE_REDIS_PORT: 6379
      GITWISE_REPOS_PATH: /data/repos
      GITWISE_SECRET: change-me-in-production
    volumes:
      - git_data:/data/repos
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: gitwise
      POSTGRES_PASSWORD: gitwise
      POSTGRES_DB: gitwise
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gitwise"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pg_data:
  redis_data:
  git_data:
