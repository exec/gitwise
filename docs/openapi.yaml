              items:
                $ref: "#/components/schemas/DiffFile"
            stats:
              type: object
              properties:
                total_files:
                  type: integer
                total_additions:
                  type: integer
                total_deletions:
                  type: integer

    GitUser:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
        date:
          type: string
          format: date-time

    DiffFile:
      type: object
      properties:
        path:
          type: string
        old_path:
          type: string
        status:
          type: string
          enum: [added, modified, deleted, renamed]
        insertions:
          type: integer
        deletions:
          type: integer
        patch:
          type: string

    Branch:
      type: object
      properties:
        name:
          type: string
        sha:
          type: string
        is_head:
          type: boolean

    # ─── Issue ───────────────────────────────────────────────────────
    Issue:
      type: object
      properties:
        id:
          type: string
          format: uuid
        repo_id:
          type: string
          format: uuid
        number:
          type: integer
        author_id:
          type: string
          format: uuid
        author_name:
          type: string
        title:
          type: string
        body:
          type: string
        status:
          type: string
          enum: [open, closed, duplicate]
        labels:
          type: array
          items:
            type: string
        assignees:
          type: array
          items:
            type: string
            format: uuid
        milestone_id:
          type: string
          format: uuid
          nullable: true
        priority:
          type: string
          enum: [critical, high, medium, low, none]
        closed_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    CreateIssueRequest:
      type: object
      required: [title]
      properties:
        title:
          type: string
          maxLength: 500
        body:
          type: string
        labels:
          type: array
          items:
            type: string
        priority:
          type: string
          enum: [critical, high, medium, low, none]
        assignees:
          type: array
          items:
            type: string
        milestone_id:
          type: string
          format: uuid

    UpdateIssueRequest:
      type: object
      properties:
        title:
          type: string
        body:
          type: string
        status:
          type: string
          enum: [open, closed, duplicate]
        labels:
          type: array
          items:
            type: string
        priority:
          type: string
          enum: [critical, high, medium, low, none]
        assignees:
          type: array
          items:
            type: string
        milestone_id:
          type: string
          format: uuid

    # ─── Pull Request ────────────────────────────────────────────────
    PullRequest:
      type: object
      properties:
        id:
          type: string
          format: uuid
        repo_id:
          type: string
          format: uuid
        number:
          type: integer
        author_id:
          type: string
          format: uuid
        author_name:
          type: string
        title:
          type: string
        body:
          type: string
        source_branch:
          type: string
        target_branch:
          type: string
        status:
          type: string
          enum: [draft, open, merged, closed]
        intent:
          $ref: "#/components/schemas/PRIntent"
        diff_stats:
          type: object
        review_summary:
          type: object
        merge_strategy:
          type: string
          nullable: true
        merged_by:
          type: string
          format: uuid
          nullable: true
        merged_by_name:
          type: string
        merged_at:
          type: string
          format: date-time
          nullable: true
        closed_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    PRIntent:
      type: object
      properties:
        type:
          type: string
          enum: [feature, bugfix, refactor, chore]
        scope:
          type: string
        components:
          type: array
          items:
            type: string

    CreatePullRequestRequest:
      type: object
      required: [title, source_branch, target_branch]
      properties:
        title:
          type: string
          maxLength: 500
        body:
          type: string
        source_branch:
          type: string
        target_branch:
          type: string
        draft:
          type: boolean
          default: false
        intent:
          $ref: "#/components/schemas/PRIntent"

    UpdatePullRequestRequest:
      type: object
      properties:
        title:
          type: string
        body:
          type: string
        target_branch:
          type: string
        status:
          type: string
          enum: [draft, open, closed]
        intent:
          $ref: "#/components/schemas/PRIntent"

    MergePullRequestRequest:
      type: object
      properties:
        strategy:
          type: string
          enum: [merge, squash, rebase]
          default: merge
        message:
          type: string
          description: Custom merge commit message (optional)
        delete_branch:
          type: boolean
          default: false

    PRDiffResponse:
      type: object
      properties:
        commits:
          type: array
          items:
            $ref: "#/components/schemas/Commit"
        files:
          type: array
          items:
            $ref: "#/components/schemas/DiffFile"
        stats:
          type: object
          properties:
            total_commits:
              type: integer
            total_files:
              type: integer
            total_additions:
              type: integer
            total_deletions:
              type: integer

    # ─── Review ──────────────────────────────────────────────────────
    Review:
      type: object
      properties:
        id:
          type: string
          format: uuid
        pr_id:
          type: string
          format: uuid
        author_id:
          type: string
          format: uuid
        author_name:
          type: string
        type:
          type: string
          enum: [approval, changes_requested, comment, dismissal]
        body:
          type: string
        comments:
          type: array
          items:
            $ref: "#/components/schemas/InlineComment"
        submitted_at:
          type: string
          format: date-time

    CreateReviewRequest:
      type: object
      required: [type]
      properties:
        type:
          type: string
          enum: [approval, changes_requested, comment]
        body:
          type: string
        comments:
          type: array
          items:
            $ref: "#/components/schemas/InlineCommentInput"

    InlineComment:
      type: object
      properties:
        path:
          type: string
        line:
          type: integer
        side:
          type: string
          enum: [left, right]
        body:
          type: string
        thread_id:
          type: string
        resolved:
          type: boolean

    InlineCommentInput:
      type: object
      required: [path, line, body]
      properties:
        path:
          type: string
        line:
          type: integer
        side:
          type: string
          enum: [left, right]
        body:
          type: string
        thread_id:
          type: string
        resolved:
          type: boolean

    ResolveThreadRequest:
      type: object
      required: [resolved]
      properties:
        resolved:
          type: boolean

