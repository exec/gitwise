          type: string
          format: uuid
        issue_id:
          type: string
          format: uuid
          nullable: true
        pr_id:
          type: string
          format: uuid
          nullable: true
        author_id:
          type: string
          format: uuid
        author_name:
          type: string
        body:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    CreateCommentRequest:
      type: object
      required: [body]
      properties:
        body:
          type: string

