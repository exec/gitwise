    Milestone:
      type: object
      properties:
        id:
          type: string
          format: uuid
        repo_id:
          type: string
          format: uuid
        title:
          type: string
        description:
          type: string
        due_date:
          type: string
          format: date-time
          nullable: true
        status:
          type: string
        created_at:
          type: string
          format: date-time

    CreateMilestoneRequest:
      type: object
      required: [title]
      properties:
        title:
          type: string
          maxLength: 255
        description:
          type: string
        due_date:
          type: string
          format: date-time

    UpdateMilestoneRequest:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        due_date:
          type: string
          format: date-time
        status:
          type: string

