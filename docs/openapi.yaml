openapi: 3.0.3
info:
  title: Gitwise API
  description: |
    REST API for Gitwise, an AI-native self-hosted code collaboration platform.

    All API responses use a standard JSON envelope:
    ```json
    {
      "data": { ... },
      "meta": { "total": 0, "next_cursor": "" },
      "errors": [{ "code": "...", "message": "...", "field": "..." }]
    }
    ```

    Authentication is via session cookie (set by login/register endpoints) or
    Bearer token (API tokens created via `/api/v1/auth/tokens`).
  version: 1.0.0
  license:
    name: MIT

servers:
  - url: /api/v1
    description: API v1

security:
  - sessionCookie: []
  - bearerToken: []

tags:
  - name: Auth
    description: Registration, login, logout, session, OAuth, API tokens
  - name: Two-Factor Authentication
    description: TOTP 2FA setup, enable, disable, verify
  - name: User Profile
    description: Profile management, contributions, pinned repos
  - name: SSH Keys
    description: Manage SSH keys for git-over-SSH access
  - name: Repositories
    description: Repository CRUD and listing
  - name: Code Browsing
    description: File trees, blobs, commits, branches, blame
  - name: Issues
    description: Issue tracking with labels, milestones, and comments
  - name: Pull Requests
    description: Pull requests, merging, diffs
  - name: Reviews
    description: Code review with inline comments and thread resolution
  - name: Labels
    description: Repository labels for issues and PRs
  - name: Milestones
    description: Repository milestones
  - name: Branch Protection
    description: Branch protection rules
  - name: Webhooks
    description: Repository webhooks and delivery history
  - name: Notifications
    description: User notifications and preferences
  - name: Watching
    description: Repository watch/unwatch
  - name: Activity
    description: Activity feeds for repos and users
  - name: Organizations
    description: Organization CRUD, members
  - name: Teams
    description: Organization teams, team members, team repos
  - name: Search
    description: Full-text and semantic code search
  - name: Admin
    description: Admin panel (requires admin role)
  - name: Namespace
    description: Namespace resolution (user or org)

paths:
  # ─── Health ──────────────────────────────────────────────────────────
  /healthz:
    get:
      summary: Health check
      operationId: healthCheck
      tags: [Auth]
      security: []
      servers:
        - url: /
      responses:
        "200":
          description: Server is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      status:
                        type: string
                        example: ok

  # ─── Auth ────────────────────────────────────────────────────────────
  /auth/register:
    post:
      summary: Register a new user
      operationId: register
      tags: [Auth]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateUserRequest"
      responses:
        "201":
          description: User created and session started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DataResponse_User"
        "400":
          $ref: "#/components/responses/BadRequest"
        "409":
          $ref: "#/components/responses/Conflict"

  /auth/login:
    post:
      summary: Log in with username/email and password
      description: |
        Returns the user object on success. If the user has 2FA enabled,
        returns `{ "requires_2fa": true, "pending_token": "..." }` instead
        of creating a session. Use `/auth/verify-2fa` to complete login.
      operationId: login
      tags: [Auth]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login successful or 2FA required
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/DataResponse_User"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          requires_2fa:
                            type: boolean
                          pending_token:
                            type: string
        "401":
          $ref: "#/components/responses/Unauthorized"

  /auth/logout:
    post:
      summary: Log out (destroy session)
      operationId: logout
      tags: [Auth]
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DataResponse_Status"

  /auth/me:
    get:
      summary: Get the currently authenticated user
      operationId: getMe
      tags: [Auth]
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DataResponse_User"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /auth/providers:
    get:
      summary: List enabled OAuth providers
      operationId: listProviders
      tags: [Auth]
      security: []
      responses:
        "200":
          description: Array of provider names (e.g. ["github"])
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: string

  /auth/verify-2fa:
    post:
      summary: Complete login with 2FA code
      operationId: verify2FA
      tags: [Auth]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [pending_token, code]
              properties:
                pending_token:
                  type: string
                code:
                  type: string
                  description: 6-digit TOTP code or recovery code
      responses:
        "200":
          description: 2FA verified, session created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DataResponse_User"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          description: Too many failed attempts

  /auth/github:
    get:
      summary: Initiate GitHub OAuth login
      operationId: githubLogin
      tags: [Auth]
      security: []
      responses:
        "307":
          description: Redirect to GitHub authorization page

  /auth/github/callback:
    get:
      summary: GitHub OAuth callback
      operationId: githubCallback
      tags: [Auth]
      security: []
      parameters:
        - name: code
          in: query
          schema:
            type: string
        - name: state
          in: query
          schema:
            type: string
      responses:
        "307":
          description: Redirect to frontend (session set via cookie)

  # ─── API Tokens ──────────────────────────────────────────────────────
  /auth/tokens:
    post:
      summary: Create an API token
      operationId: createToken
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTokenRequest"
      responses:
        "201":
          description: Token created (token value only returned once)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DataResponse_APIToken"
        "401":
          $ref: "#/components/responses/Unauthorized"
    get:
      summary: List API tokens for the current user
      operationId: listTokens
      tags: [Auth]
      responses:
        "200":
          description: List of tokens (token values are not included)
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/APIToken"

  /auth/tokens/{tokenID}:
    delete:
      summary: Delete an API token
      operationId: deleteToken
      tags: [Auth]
      parameters:
        - name: tokenID
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Token deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DataResponse_Status"
        "404":
          $ref: "#/components/responses/NotFound"

  # ─── Two-Factor Authentication ───────────────────────────────────────
  /user/2fa/status:
    get:
      summary: Check if 2FA is enabled
      operationId: get2FAStatus
      tags: [Two-Factor Authentication]
      responses:
        "200":
          description: 2FA status
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      enabled:
                        type: boolean

  /user/2fa/setup:
    post:
      summary: Generate TOTP secret and QR code
      operationId: setup2FA
      tags: [Two-Factor Authentication]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [current_password]
              properties:
                current_password:
                  type: string
      responses:
        "200":
          description: TOTP setup data
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      secret:
                        type: string
                      uri:
                        type: string
                      qr_code:
                        type: string
                        description: Base64-encoded PNG data URI
                      recovery_codes:
                        type: array
                        items:
                          type: string
        "409":
          description: 2FA already enabled

  /user/2fa/enable:
    post:
      summary: Activate 2FA with a TOTP code
      operationId: enable2FA
      tags: [Two-Factor Authentication]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [code]
              properties:
                code:
                  type: string
      responses:
        "200":
          description: 2FA enabled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DataResponse_Status"

  /user/2fa/disable:
    post:
      summary: Disable 2FA with a TOTP or recovery code
      operationId: disable2FA
      tags: [Two-Factor Authentication]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [code]
              properties:
                code:
                  type: string
      responses:
        "200":
          description: 2FA disabled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DataResponse_Status"

  # ─── SSH Keys ────────────────────────────────────────────────────────
  /user/ssh-keys:
    post:
      summary: Add an SSH key
      operationId: createSSHKey
      tags: [SSH Keys]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSSHKeyRequest"
      responses:
        "201":
          description: SSH key added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DataResponse_SSHKey"
        "400":
          $ref: "#/components/responses/BadRequest"
        "409":
          description: Duplicate key
    get:
      summary: List SSH keys for the current user
      operationId: listSSHKeys
      tags: [SSH Keys]
      responses:
        "200":
          description: List of SSH keys
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/SSHKey"

  /user/ssh-keys/{keyID}:
    delete:
      summary: Delete an SSH key
      operationId: deleteSSHKey
      tags: [SSH Keys]
      parameters:
        - name: keyID
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Key deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DataResponse_Status"
        "404":
          $ref: "#/components/responses/NotFound"

  # ─── User Profile ───────────────────────────────────────────────────
  /user/repos:
    get:
      summary: List repositories for the authenticated user
      operationId: listMyRepos
      tags: [Repositories]
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of repositories
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DataResponse_RepoList"

  /user/profile:
    patch:
      summary: Update the authenticated user's profile
      operationId: updateProfile
      tags: [User Profile]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUserRequest"
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DataResponse_User"

  /user/pinned-repos:
    put:
      summary: Set pinned repositories on profile
      operationId: setPinnedRepos
      tags: [User Profile]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SetPinnedReposRequest"
      responses:
        "200":
          description: Updated pinned repos
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/PinnedRepo"

  /users/{username}:
    get:
      summary: Get a user's public profile
      operationId: getUser
      tags: [User Profile]
      security: []
      parameters:
        - $ref: "#/components/parameters/username"
      responses:
        "200":
          description: User profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DataResponse_User"
        "404":
          $ref: "#/components/responses/NotFound"

  /users/{username}/repos:
    get:
      summary: List a user's repositories
      operationId: listUserRepos
      tags: [Repositories]
      security: []
      parameters:
        - $ref: "#/components/parameters/username"
      responses:
        "200":
          description: List of repositories
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DataResponse_RepoList"

  /users/{username}/contributions:
    get:
      summary: Get contribution data for a user
      operationId: getContributions
      tags: [User Profile]
      security: []
      parameters:
        - $ref: "#/components/parameters/username"
        - name: from
          in: query
          description: Start date (YYYY-MM-DD). Defaults to Jan 1 of current year.
          schema:
            type: string
            format: date
        - name: to
          in: query
          description: End date (YYYY-MM-DD). Defaults to today.
          schema:
            type: string
            format: date
      responses:
        "200":
          description: Array of day counts
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/DayCount"

  /users/{username}/pinned-repos:
    get:
      summary: Get a user's pinned repositories
      operationId: listPinnedRepos
      tags: [User Profile]
      security: []
      parameters:
        - $ref: "#/components/parameters/username"
      responses:
        "200":
          description: Pinned repos
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/PinnedRepo"

  /users/{username}/activity:
    get:
      summary: Get a user's activity feed
      operationId: listUserActivity
      tags: [Activity]
      security: []
      parameters:
        - $ref: "#/components/parameters/username"
        - $ref: "#/components/parameters/cursor"
        - $ref: "#/components/parameters/limit"
      responses:
        "200":
          $ref: "#/components/responses/PaginatedList"

  /users/{username}/orgs:
    get:
      summary: List a user's public organizations
      operationId: listPublicUserOrgs
      tags: [Organizations]
      security: []
      parameters:
        - $ref: "#/components/parameters/username"
      responses:
        "200":
          description: List of org memberships
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/OrgMembership"

  # ─── Repositories ───────────────────────────────────────────────────
  /repos:
    get:
      summary: List repositories
      description: |
        Authenticated users see their own repos plus public repos.
        Unauthenticated users see public repos only.
      operationId: listRepos
      tags: [Repositories]
      security: []
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of repositories
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DataResponse_RepoList"
    post:
      summary: Create a repository
      operationId: createRepo
      tags: [Repositories]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateRepoRequest"
      responses:
        "201":
          description: Repository created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DataResponse_Repository"
        "400":
          $ref: "#/components/responses/BadRequest"
        "409":
          $ref: "#/components/responses/Conflict"

  /repos/{owner}/{repo}:
    get:
      summary: Get a repository
      operationId: getRepo
      tags: [Repositories]
      security: []
      parameters:
        - $ref: "#/components/parameters/owner"
        - $ref: "#/components/parameters/repo"
      responses:
        "200":
          description: Repository details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DataResponse_Repository"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      summary: Update a repository
      operationId: updateRepo
      tags: [Repositories]
      parameters:
        - $ref: "#/components/parameters/owner"
        - $ref: "#/components/parameters/repo"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateRepoRequest"
      responses:
        "200":
          description: Updated repository
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DataResponse_Repository"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      summary: Delete a repository
      operationId: deleteRepo
      tags: [Repositories]
      parameters:
        - $ref: "#/components/parameters/owner"
        - $ref: "#/components/parameters/repo"
      responses:
        "200":
          description: Repository deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DataResponse_Status"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  # ─── Code Browsing ──────────────────────────────────────────────────
  /repos/{owner}/{repo}/tree/{ref}:
    get:
      summary: Get the root file tree
      operationId: getRootTree
      tags: [Code Browsing]
      security: []
      parameters:
        - $ref: "#/components/parameters/owner"
        - $ref: "#/components/parameters/repo"
        - $ref: "#/components/parameters/ref"
      responses:
        "200":
          description: Tree entries
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/TreeEntry"

  /repos/{owner}/{repo}/tree/{ref}/{path}:
    get:
      summary: Get a file tree at a path
      operationId: getTree
      tags: [Code Browsing]
      security: []
      parameters:
        - $ref: "#/components/parameters/owner"
        - $ref: "#/components/parameters/repo"
        - $ref: "#/components/parameters/ref"
        - name: path
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Tree entries
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/TreeEntry"

  /repos/{owner}/{repo}/blob/{ref}/{path}:
    get:
      summary: Get file content
      operationId: getBlob
      tags: [Code Browsing]
      security: []
      parameters:
        - $ref: "#/components/parameters/owner"
        - $ref: "#/components/parameters/repo"
        - $ref: "#/components/parameters/ref"
        - name: path
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Blob content
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/BlobContent"
        "404":
          $ref: "#/components/responses/NotFound"

  /repos/{owner}/{repo}/raw/{ref}/{path}:
    get:
      summary: Get raw file content
      operationId: getRawBlob
      tags: [Code Browsing]
      security: []
      parameters:
        - $ref: "#/components/parameters/owner"
        - $ref: "#/components/parameters/repo"
        - $ref: "#/components/parameters/ref"
        - name: path
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Raw file content
          content:
            text/plain:
              schema:
                type: string

  /repos/{owner}/{repo}/blame/{ref}/{path}:
    get:
      summary: Get blame data for a file
      operationId: getBlame
      tags: [Code Browsing]
      security: []
      parameters:
        - $ref: "#/components/parameters/owner"
        - $ref: "#/components/parameters/repo"
        - $ref: "#/components/parameters/ref"
        - name: path
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Blame lines
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/BlameLine"

  /repos/{owner}/{repo}/commits:
    get:
      summary: List commits
      operationId: listCommits
      tags: [Code Browsing]
      security: []
      parameters:
        - $ref: "#/components/parameters/owner"
        - $ref: "#/components/parameters/repo"
        - name: ref
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
        - name: per_page
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of commits
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Commit"
                  meta:
                    $ref: "#/components/schemas/ResponseMeta"

  /repos/{owner}/{repo}/commits/{sha}:
    get:
      summary: Get a single commit with diff
      operationId: getCommit
      tags: [Code Browsing]
      security: []
      parameters:
        - $ref: "#/components/parameters/owner"
        - $ref: "#/components/parameters/repo"
        - name: sha
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Commit detail with diff
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/CommitDetail"

  /repos/{owner}/{repo}/branches:
    get:
      summary: List branches
      operationId: listBranches
      tags: [Code Browsing]
      security: []
      parameters:
        - $ref: "#/components/parameters/owner"
        - $ref: "#/components/parameters/repo"
      responses:
        "200":
          description: List of branches
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Branch"

  # ─── Issues ─────────────────────────────────────────────────────────
  /repos/{owner}/{repo}/issues:
    get:
      summary: List issues
      operationId: listIssues
      tags: [Issues]
      security: []
      parameters:
        - $ref: "#/components/parameters/owner"
        - $ref: "#/components/parameters/repo"
        - name: status
          in: query
          description: Filter by status (open, closed, duplicate)
          schema:
            type: string
        - $ref: "#/components/parameters/cursor"
        - $ref: "#/components/parameters/limit"
      responses:
        "200":
          description: List of issues
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Issue"
                  meta:
                    $ref: "#/components/schemas/ResponseMeta"
    post:
      summary: Create an issue
      operationId: createIssue
      tags: [Issues]
      parameters:
        - $ref: "#/components/parameters/owner"
        - $ref: "#/components/parameters/repo"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateIssueRequest"
      responses:
        "201":
          description: Issue created
          content:
            application/json:
