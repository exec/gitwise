          type: integer
        require_linear:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    CreateBranchProtectionRequest:
      type: object
      required: [branch_pattern]
      properties:
        branch_pattern:
          type: string
          maxLength: 255
        required_reviews:
          type: integer
          default: 0
        require_linear:
          type: boolean
          default: false

    UpdateBranchProtectionRequest:
      type: object
      properties:
        required_reviews:
          type: integer
        require_linear:
          type: boolean

    # ─── Webhook ─────────────────────────────────────────────────────
    Webhook:
      type: object
      properties:
        id:
          type: string
          format: uuid
        repo_id:
          type: string
          format: uuid
        url:
          type: string
          format: uri
        events:
          type: array
          items:
            type: string
        active:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    CreateWebhookRequest:
      type: object
      required: [url, events]
      properties:
        url:
          type: string
          format: uri
        secret:
          type: string
        events:
          type: array
          items:
            type: string
          description: "Event types: issue.opened, issue.closed, pr.opened, pr.closed, pr.merged, review.submitted, comment.created, push"
        active:
          type: boolean
          default: true

    UpdateWebhookRequest:
      type: object
      properties:
        url:
          type: string
          format: uri
        secret:
          type: string
        events:
          type: array
          items:
            type: string
        active:
          type: boolean

    WebhookDelivery:
      type: object
