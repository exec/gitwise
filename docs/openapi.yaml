          type: string
          description: Hex color (e.g. #ff0000)
        description:
          type: string

    CreateLabelRequest:
      type: object
      required: [name, color]
      properties:
        name:
          type: string
          maxLength: 255
        color:
          type: string
        description:
          type: string

    UpdateLabelRequest:
      type: object
      properties:
        name:
          type: string
        color:
          type: string
        description:
          type: string

