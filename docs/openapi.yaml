# ═══════════════════════════════════════════════════════════════════════
# Components
# ═══════════════════════════════════════════════════════════════════════
components:
  securitySchemes:
    sessionCookie:
      type: apiKey
      in: cookie
      name: session
      description: Session cookie set by login/register endpoints
    bearerToken:
      type: http
      scheme: bearer
      description: API token created via /api/v1/auth/tokens

  parameters:
    owner:
      name: owner
      in: path
      required: true
      schema:
        type: string
      description: Repository owner (username or org name)
    repo:
      name: repo
      in: path
      required: true
      schema:
        type: string
      description: Repository name
    ref:
      name: ref
      in: path
      required: true
      schema:
        type: string
      description: Git ref (branch, tag, or commit SHA)
    number:
      name: number
      in: path
      required: true
      schema:
        type: integer
      description: Issue or pull request number
    username:
      name: username
      in: path
      required: true
      schema:
        type: string
    orgName:
      name: name
      in: path
      required: true
      schema:
        type: string
      description: Organization name
    cursor:
      name: cursor
      in: query
      schema:
        type: string
      description: Pagination cursor
    limit:
      name: limit
      in: query
      schema:
        type: integer
      description: Maximum number of results

  responses:
    BadRequest:
      description: Validation error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Unauthorized:
      description: Not authenticated
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Forbidden:
      description: Insufficient permissions
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Conflict:
      description: Resource already exists
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    PaginatedList:
      description: Paginated list response
      content:
        application/json:
          schema:
            type: object
            properties:
              data:
                type: array
                items:
                  type: object
              meta:
                $ref: "#/components/schemas/ResponseMeta"

  schemas:
    # ─── Envelope ────────────────────────────────────────────────────
    ErrorResponse:
      type: object
      properties:
        errors:
          type: array
          items:
            type: object
            properties:
              code:
                type: string
              message:
                type: string
              field:
                type: string

    ResponseMeta:
      type: object
      properties:
        total:
          type: integer
        next_cursor:
          type: string
        prev_cursor:
          type: string

    # ─── Generic Data Wrappers ───────────────────────────────────────
    DataResponse_Status:
      type: object
      properties:
        data:
          type: object
          properties:
            status:
              type: string

    DataResponse_User:
      type: object
      properties:
        data:
          $ref: "#/components/schemas/User"

    DataResponse_Repository:
      type: object
      properties:
        data:
          $ref: "#/components/schemas/Repository"

    DataResponse_RepoList:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Repository"

    DataResponse_Issue:
      type: object
      properties:
        data:
          $ref: "#/components/schemas/Issue"

    DataResponse_PullRequest:
      type: object
      properties:
        data:
          $ref: "#/components/schemas/PullRequest"

    DataResponse_APIToken:
      type: object
      properties:
        data:
          $ref: "#/components/schemas/APIToken"

    DataResponse_SSHKey:
      type: object
      properties:
        data:
          $ref: "#/components/schemas/SSHKey"

    # ─── User ────────────────────────────────────────────────────────
    User:
      type: object
      properties:
        id:
          type: string
          format: uuid
        username:
          type: string
        email:
          type: string
          format: email
        full_name:
          type: string
        avatar_url:
          type: string
        bio:
          type: string
        is_admin:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    CreateUserRequest:
      type: object
      required: [username, email, password]
      properties:
        username:
          type: string
          minLength: 2
          maxLength: 40
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
        full_name:
          type: string

    LoginRequest:
      type: object
      required: [login, password]
      properties:
        login:
          type: string
          description: Username or email
        password:
          type: string

    UpdateUserRequest:
      type: object
      properties:
        full_name:
          type: string
        bio:
          type: string
        avatar_url:
          type: string

    # ─── API Token ───────────────────────────────────────────────────
    APIToken:
      type: object
      properties:
        id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        name:
          type: string
        token:
          type: string
          description: Only present in creation response
        scopes:
          type: array
          items:
            type: string
        expires_at:
          type: string
          format: date-time
          nullable: true
        last_used:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time

    CreateTokenRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
        scopes:
          type: array
          items:
            type: string
        expires_at:
          type: string
          format: date-time

    # ─── SSH Key ─────────────────────────────────────────────────────
    SSHKey:
      type: object
      properties:
        id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        name:
          type: string
        fingerprint:
          type: string
        key_type:
          type: string
        created_at:
          type: string
          format: date-time

    CreateSSHKeyRequest:
      type: object
      required: [title, public_key]
      properties:
        title:
          type: string
        public_key:
          type: string

    # ─── Repository ──────────────────────────────────────────────────
    Repository:
      type: object
      properties:
        id:
          type: string
          format: uuid
        owner_id:
          type: string
          format: uuid
        owner_name:
          type: string
        name:
          type: string
        description:
          type: string
        default_branch:
          type: string
        visibility:
          type: string
          enum: [public, private]
        language_stats:
          type: object
        topics:
          type: array
          items:
            type: string
        stars_count:
          type: integer
        forks_count:
          type: integer
        clone_url:
          type: string
        ssh_url:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    CreateRepoRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
          minLength: 2
          maxLength: 100
        description:
          type: string
        visibility:
          type: string
          enum: [public, private]
          default: public
        default_branch:
          type: string
          default: main
        topics:
          type: array
          items:
            type: string
        auto_init:
          type: boolean
          default: false
        org_name:
          type: string
          description: If set, create the repo under this organization

    UpdateRepoRequest:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        visibility:
          type: string
          enum: [public, private]
        default_branch:
          type: string
        topics:
          type: array
          items:
            type: string

    # ─── Git Objects ─────────────────────────────────────────────────
    TreeEntry:
      type: object
      properties:
        name:
          type: string
        path:
          type: string
        type:
          type: string
          enum: [blob, tree]
        mode:
          type: string
        sha:
          type: string
        size:
          type: integer

    BlobContent:
      type: object
      properties:
        name:
          type: string
        path:
          type: string
        sha:
          type: string
        size:
          type: integer
        content:
          type: string
        encoding:
          type: string
          enum: [utf-8, base64]
        is_binary:
          type: boolean

    BlameLine:
      type: object
      properties:
        commit_sha:
          type: string
        author_name:
          type: string
        author_email:
          type: string
        date:
          type: string
          format: date-time
        line_number:
          type: integer
        line_content:
          type: string

    Commit:
      type: object
      properties:
        sha:
          type: string
        message:
          type: string
        author:
          $ref: "#/components/schemas/GitUser"
        committer:
          $ref: "#/components/schemas/GitUser"
        parents:
          type: array
          items:
            type: string
        tree_sha:
          type: string
        date:
          type: string
          format: date-time

    CommitDetail:
      allOf:
        - $ref: "#/components/schemas/Commit"
